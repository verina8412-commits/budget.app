<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monthney AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #131316;
  --surface2: #1c1c21;
  --surface3: #242429;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0eff4;
  --muted: #5a5a6e;
  --muted2: #3a3a4a;
  --expense: #ff5252;
  --income: #00e5a0;
  --accent: #7c6cf8;
  --font: 'Sora', sans-serif;
  --mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 40px;
  -webkit-font-smoothing: antialiased;
}

/* ── SETUP SCREEN ─────────────────────────── */
#setupScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px;
  z-index: 100;
}
.setup-logo { font-size: 32px; margin-bottom: 8px; }
.setup-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; text-align: center; }
.setup-label { font-size: 11px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; align-self: flex-start; width: 100%; max-width: 400px; }
.setup-input {
  width: 100%; max-width: 400px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  outline: none;
  margin-bottom: 16px;
}
.setup-input:focus { border-color: var(--accent); }
.setup-btn {
  width: 100%; max-width: 400px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 8px;
}
.setup-btn:hover { opacity: .85; }
.setup-hint { font-size: 12px; color: var(--muted); margin-top: 16px; text-align: center; max-width: 360px; line-height: 1.6; }
.setup-link { color: var(--accent); text-decoration: none; }

/* ── MAIN APP ─────────────────────────── */
#app { width: 100%; max-width: 480px; padding: 0 16px; display: none; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 0 20px;
}
.brand { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
.brand span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-badge {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 5px 11px; border-radius: 99px;
}
.settings-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: background .15s;
}
.settings-btn:hover { background: var(--surface3); }

/* ── MIC BUTTON ── */
.mic-section {
  display: flex; flex-direction: column; align-items: center;
  padding: 28px 0 24px;
}
.mic-ring {
  position: relative;
  width: 120px; height: 120px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.mic-ring::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  transition: all .3s;
}
.mic-ring.listening::before {
  border-color: var(--accent);
  box-shadow: 0 0 0 12px rgba(124,108,248,.08), 0 0 0 24px rgba(124,108,248,.04);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 8px rgba(124,108,248,.1), 0 0 0 20px rgba(124,108,248,.04); }
  50% { box-shadow: 0 0 0 16px rgba(124,108,248,.08), 0 0 0 32px rgba(124,108,248,.02); }
}
.mic-btn {
  width: 88px; height: 88px; border-radius: 50%;
  background: var(--surface2);
  border: 1.5px solid var(--border2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  transition: all .2s;
  position: relative;
  z-index: 1;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.mic-btn:hover { background: var(--surface3); }
.mic-btn.listening {
  background: rgba(124,108,248,.15);
  border-color: var(--accent);
}
.mic-btn.processing {
  background: rgba(124,108,248,.1);
  border-color: var(--accent);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.mic-label {
  font-size: 13px; color: var(--muted);
  text-align: center; min-height: 20px;
  transition: color .2s;
}
.mic-label.active { color: var(--accent); }

/* ── OR DIVIDER ── */
.or-row {
  display: flex; align-items: center; gap: 12px;
  margin: 4px 0 16px;
}
.or-line { flex: 1; height: 1px; background: var(--border); }
.or-text { font-size: 11px; color: var(--muted2); letter-spacing: .08em; }

/* ── TEXT INPUT ── */
.text-row {
  display: flex; gap: 8px; margin-bottom: 20px;
}
#textInput {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 16px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--text);
  outline: none;
}
#textInput:focus { border-color: var(--border2); }
#textInput::placeholder { color: var(--muted); }
.send-btn {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--accent);
  border: none; cursor: pointer;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s;
}
.send-btn:hover { opacity: .85; }

/* ── AI RESULT CARD ── */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 16px;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-type-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.result-type-btn {
  flex: 1; padding: 13px 12px;
  background: transparent; border: none;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--muted); cursor: pointer;
  position: relative; transition: all .2s;
}
.result-type-btn.active-expense { color: var(--expense); background: rgba(255,82,82,.06); }
.result-type-btn.active-income  { color: var(--income);  background: rgba(0,229,160,.06); }
.result-type-btn::after {
  content: ''; position: absolute;
  bottom: 0; left: 12px; right: 12px; height: 2px;
  border-radius: 2px 2px 0 0; background: transparent;
  transition: background .2s;
}
.result-type-btn.active-expense::after { background: var(--expense); }
.result-type-btn.active-income::after  { background: var(--income); }

.result-body { padding: 16px; }

.amount-display {
  display: flex; align-items: baseline; gap: 4px;
  margin-bottom: 16px;
}
.currency { font-family: var(--mono); font-size: 18px; color: var(--muted); }
#resultAmount {
  font-family: var(--mono); font-size: 36px; font-weight: 500;
  background: transparent; border: none; outline: none;
  color: var(--text); width: 100%;
}

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.field-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 13px;
}
.field-box.full { grid-column: 1/-1; }
.field-box label { display: block; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field-box select, .field-box input {
  width: 100%;
  background: transparent; border: none; outline: none;
  font-family: var(--font); font-size: 14px; color: var(--text);
  appearance: none; -webkit-appearance: none;
}
.field-box select { cursor: pointer; }
.field-box option { background: #1c1c21; }

.ai-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--accent);
  background: rgba(124,108,248,.1);
  border: 1px solid rgba(124,108,248,.2);
  border-radius: 99px; padding: 3px 10px;
  margin-bottom: 14px;
}

.confirm-btn {
  width: 100%; padding: 15px;
  border: none; border-radius: 12px;
  font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  background: var(--accent); color: #fff;
}
.confirm-btn.is-expense { background: var(--expense); }
.confirm-btn.is-income  { background: var(--income); color: #000; }
.confirm-btn:disabled { opacity: .5; cursor: not-allowed; }
.confirm-btn:not(:disabled):hover { filter: brightness(1.1); }

/* ── QUICK AMOUNTS ── */
.quick-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.q-chip {
  font-family: var(--mono); font-size: 12px;
  padding: 5px 12px; border-radius: 99px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted); cursor: pointer;
  transition: all .15s;
}
.q-chip:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }
.q-chip:active { transform: scale(.95); }

/* ── HISTORY ── */
.history-section { margin-top: 8px; }
.section-label {
  font-size: 10px; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted2);
  margin-bottom: 10px;
}
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 7px;
  animation: fadeUp .25s ease;
}
.hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hist-info { flex: 1; min-width: 0; }
.hist-desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hist-amount { font-family: var(--mono); font-size: 13px; font-weight: 500; flex-shrink: 0; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  padding: 12px 22px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none; white-space: nowrap; z-index: 999;
  max-width: calc(100vw - 40px); text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { background: var(--income); color: #000; }
#toast.err { background: var(--expense); color: #fff; }
#toast.info { background: var(--surface3); color: var(--text); border: 1px solid var(--border2); }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <div class="setup-logo">💸</div>
  <div class="setup-title">Monthney AI</div>
  <div class="setup-sub">Nhập giao dịch bằng giọng nói, AI tự phân loại và ghi vào Notion</div>

  <div class="setup-label">OpenRouter API Key</div>
  <input class="setup-input" id="geminiKeyInput" type="password"
    placeholder="sk-or-v1-..." autocomplete="off" />

  <div class="setup-btn" onclick="saveAndStart()">Bắt đầu →</div>

  <div class="setup-hint">
    Lấy key miễn phí tại
    <a class="setup-link" href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>
    · Key được lưu trong máy bạn, không gửi đi đâu khác.
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="brand"><span>M</span>onthney AI</div>
    <div class="header-right">
      <div class="date-badge" id="dateBadge"></div>
      <div class="settings-btn" onclick="resetKey()" title="Đổi API key">⚙️</div>
    </div>
  </header>

  <!-- MIC -->
  <div class="mic-section">
    <div class="mic-ring" id="micRing">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    </div>
    <div class="mic-label" id="micLabel">Nhấn để nói</div>
  </div>

  <!-- TEXT INPUT -->
  <div class="or-row">
    <div class="or-line"></div>
    <div class="or-text">HOẶC GÕ</div>
    <div class="or-line"></div>
  </div>
  <div class="text-row">
    <input id="textInput" type="text"
      placeholder='vd: "ăn phở 50k" hay "lương 15 triệu"'
      onkeydown="if(event.key==='Enter') analyzeText()" />
    <button class="send-btn" onclick="analyzeText()">→</button>
  </div>

  <!-- QUICK AMOUNTS (shortcut chips) -->
  <div class="quick-row" id="quickChips"></div>

  <!-- AI RESULT -->
  <div id="resultCard" style="display:none"></div>

  <!-- HISTORY -->
  <div class="history-section">
    <div class="section-label">Vừa ghi</div>
    <div id="histList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ────────────────────────────────────────────
   CONFIG (hardcoded từ Notion của bạn)
──────────────────────────────────────────── */
const NOTION_TOKEN  = 'ntn_o84113416286wrUjAZulqSNZs7pq3uRzGQLsLXoeLYh2Yz';
const EXPENSES_DB   = 'f6e1f55a-e33c-82ad-9927-07e095457a53';
const INCOMES_DB    = 'bc01f55a-e33c-8268-95a6-07928835dca7';

const ACCOUNTS = [
  { name: 'Vietinbank',  id: '79e1f55a-e33c-834a-bd91-01dd75e74d2b' },
  { name: 'Debit Visa',  id: '3481f55a-e33c-82e2-b626-81515887b81a' },
  { name: 'Saving 01',   id: 'f5c1f55a-e33c-8226-bd76-811247a6be3d' },
];

// Expense categories (Sowing Journeys DB) — IDs đã xác nhận
// Các ID null = app vẫn ghi nhưng không link category relation
const EXP_CATS = [
  { name: 'Ăn uống',     id: null },
  { name: 'Be',           id: null },
  { name: 'Siêu thị',   id: null },
  { name: 'Mỹ phẩm',    id: null },
  { name: 'Quần áo',    id: null },
  { name: 'Shopee VIP', id: '0691f55a-e33c-82a5-91b9-812f2ad09007' },
  { name: 'Study',       id: 'd201f55a-e33c-8391-b6fa-81c42cb240ce' },
  { name: 'Mua sắm khác',id: null },
  { name: 'Relationships',id:'5321f55a-e33c-8233-b4d1-012ce776292c' },
  { name: 'Family',      id: 'e081f55a-e33c-8284-ba74-81691f5374cc' },
  { name: 'Làm đẹp',    id: null },
  { name: 'Sức khỏe',   id: null },
  { name: 'Others',      id: null },
];

// Income categories (trong Incomes DB — template pages)
const INC_CATS = [
  { name: 'Salary',             id: 'b751f55a-e33c-83de-8ccb-01817e99214c' },
  { name: 'Apartment for rent', id: 'efa1f55a-e33c-83fd-8f3f-01ad8c3f0f4b' },
  { name: 'Saving interest',    id: 'cee1f55a-e33c-833c-97c8-01780d24b3d6' },
  { name: 'Others',             id: '0b31f55a-e33c-8331-89b7-8136b0c62025' },
];

const QUICK = [20000, 50000, 100000, 200000, 500000, 1000000, 2000000, 5000000];

/* ────────────────────────────────────────────
   STATE
──────────────────────────────────────────── */
let geminiKey = '';
let recognition = null;
let isListening = false;
let currentResult = null; // { type, amount, desc, catName, catId, accId, accName }

/* ────────────────────────────────────────────
   INIT
──────────────────────────────────────────── */
(function init() {
  // Date badge
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('vi-VN', { weekday:'short', day:'2-digit', month:'2-digit' });

  // Quick chips
  const wrap = document.getElementById('quickChips');
  QUICK.forEach(n => {
    const c = document.createElement('button');
    c.className = 'q-chip';
    c.textContent = fmtShort(n);
    c.onclick = () => { fillAmount(n); };
    wrap.appendChild(c);
  });

  // Load saved key
  const saved = localStorage.getItem('openrouter_key');
  if (saved) {
    geminiKey = saved;
    showApp();
  }
})();

/* ────────────────────────────────────────────
   SETUP
──────────────────────────────────────────── */
function saveAndStart() {
  const k = document.getElementById('geminiKeyInput').value.trim();
  if (!k) return toast('Nhập API key trước', 'err');
  if (!k.startsWith('sk-or')) return toast('Key không hợp lệ (phải bắt đầu bằng sk-or...)', 'err');
  geminiKey = k;
  localStorage.setItem('openrouter_key', k);
  showApp();
}

function showApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setupSpeech();
}

function resetKey() {
  if (!confirm('Đổi Gemini API key?')) return;
  localStorage.removeItem('openrouter_key');
  location.reload();
}

/* ────────────────────────────────────────────
   SPEECH RECOGNITION
──────────────────────────────────────────── */
function setupSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('micLabel').textContent = 'Trình duyệt không hỗ trợ mic';
    document.getElementById('micBtn').style.opacity = '.4';
    document.getElementById('micBtn').style.cursor = 'default';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'vi-VN';
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micRing').classList.add('listening');
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '⏹';
    setMicLabel('Đang nghe...', true);
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    setMicLabel('"' + transcript + '"', true);
    if (e.results[e.results.length - 1].isFinal) {
      stopListening();
      analyzeInput(transcript);
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error === 'not-allowed') toast('Cần cấp quyền micro cho trang web', 'err');
    else toast('Lỗi mic: ' + e.error, 'err');
  };

  recognition.onend = () => { if (isListening) stopListening(); };
}

function toggleMic() {
  if (!recognition) return;
  if (isListening) { stopListening(); return; }
  try { recognition.start(); }
  catch(e) { toast('Không thể bật mic', 'err'); }
}

function stopListening() {
  isListening = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  document.getElementById('micRing').classList.remove('listening');
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').classList.remove('processing');
  document.getElementById('micBtn').textContent = '🎤';
  setMicLabel('Nhấn để nói', false);
}

function setMicLabel(txt, active) {
  const el = document.getElementById('micLabel');
  el.textContent = txt;
  el.className = 'mic-label' + (active ? ' active' : '');
}

/* ────────────────────────────────────────────
   TEXT INPUT
──────────────────────────────────────────── */
function analyzeText() {
  const val = document.getElementById('textInput').value.trim();
  if (!val) return;
  analyzeInput(val);
}

/* ────────────────────────────────────────────
   GEMINI AI
──────────────────────────────────────────── */
async function analyzeInput(text) {
  setMicLabel('AI đang phân tích...', true);
  document.getElementById('micBtn').classList.add('processing');
  document.getElementById('micBtn').textContent = '⟳';

  const expCatNames = EXP_CATS.map(c => c.name).join(', ');
  const incCatNames = INC_CATS.map(c => c.name).join(', ');
  const accNames    = ACCOUNTS.map(a => a.name).join(', ');

  const prompt = `Bạn là AI phân loại giao dịch tài chính cá nhân người Việt.

Input của người dùng: "${text}"

H�y phân tích và trả về JSON (chỉ JSON thuần, KHÔNG markdown, KHÔNG giải thích):
{
  "type": "expense" hoặc "income",
  "amount": số nguyên (quy đổi: k=1000, tr hoặc m=1000000, tỷ=1000000000),
  "description": "mô tả ngắn gọn bằng tiếng Việt",
  "category": "tên danh mục chính xác từ danh sách",
  "account": "tên tài khoản chính xác từ danh sách"
}

Danh mục chi tiêu: ${expCatNames}
Danh mục thu nhập: ${incCatNames}
Tài khoản: ${accNames}

Quy tắc:
- type=expense: mua, trả, ăn, uống, đi, thuê, đổ, nạp, chuyển, mượn, shop, order
- type=income: lương, nhận, thu, lãi, cho thuê, hoàn, được trả
- account mặc định: Vietinbank; nếu visa/thẻ/online/shopee: Debit Visa; lãi/tiết kiệm: Saving 01
- Nếu không rõ amount, trả 0`;

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${geminiKey}`,
        'HTTP-Referer': 'https://verina8412-commits.github.io',
        'X-Title': 'Monthney Budget AI',
      },
      body: JSON.stringify({
        model: 'google/gemini-2.0-flash-exp:free',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.1,
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'OpenRouter lỗi: ' + res.status);
    }

    const data = await res.json();
    let raw = data.choices?.[0]?.message?.content || '';
    raw = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);
    renderResult(parsed, text);
  } catch(e) {
    toast('AI lỗi: ' + e.message, 'err');
  } finally {
    stopListening();
    document.getElementById('textInput').value = '';
  }
}

/* ────────────────────────────────────────────
   RENDER RESULT CARD
──────────────────────────────────────────── */
function renderResult(parsed, rawText) {
  const type = parsed.type === 'income' ? 'income' : 'expense';
  const cats  = type === 'expense' ? EXP_CATS : INC_CATS;
  const cat   = cats.find(c => c.name === parsed.category) || cats[cats.length - 1];
  const acc   = ACCOUNTS.find(a => a.name === parsed.account) || ACCOUNTS[0];

  currentResult = {
    type,
    amount: parsed.amount || 0,
    description: parsed.description || rawText,
    catName: cat.name,
    catId: cat.id,
    accId: acc.id,
    accName: acc.name,
  };

  const accOptions  = ACCOUNTS.map(a =>
    `<option value="${a.id}" ${a.id===acc.id?'selected':''}>${a.name}</option>`).join('');
  const catOptions  = cats.map(c =>
    `<option value="${c.id||''}" ${c.name===cat.name?'selected':''}>${c.name}</option>`).join('');
  const isExp = type === 'expense';
  const color = isExp ? 'var(--expense)' : 'var(--income)';

  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('resultCard').innerHTML = `
    <div class="result-card">
      <div class="result-type-bar">
        <button class="result-type-btn ${isExp?'active-expense':''}"
          onclick="switchType('expense')">↓ Chi tiêu</button>
        <button class="result-type-btn ${!isExp?'active-income':''}"
          onclick="switchType('income')">↑ Thu nhập</button>
      </div>
      <div class="result-body">
        <div class="ai-badge">✦ AI phân loại · chỉnh nếu cần</div>
        <div class="amount-display">
          <span class="currency">₫</span>
          <input id="resultAmount" type="number" value="${currentResult.amount}"
            oninput="currentResult.amount=parseFloat(this.value)||0"
            style="color:${color}" />
        </div>
        <div class="field-grid">
          <div class="field-box full">
            <label>Mô tả</label>
            <input type="text" id="resultDesc" value="${escHtml(currentResult.description)}"
              oninput="currentResult.description=this.value" />
          </div>
          <div class="field-box">
            <label>Danh mục</label>
            <select id="resultCat" onchange="onCatChange(this)">${catOptions}</select>
          </div>
          <div class="field-box">
            <label>Tài khoản</label>
            <select id="resultAcc" onchange="onAccChange(this)">${accOptions}</select>
          </div>
        </div>
        <button class="confirm-btn is-${type}" id="confirmBtn"
          onclick="confirmAndWrite()">
          Ghi vào Notion →
        </button>
      </div>
    </div>`;
}

function switchType(type) {
  currentResult.type = type;
  // re-render with same data
  renderResult({ ...currentResult, category: currentResult.catName, account: currentResult.accName }, currentResult.description);
}

function onCatChange(sel) {
  const cats = currentResult.type === 'expense' ? EXP_CATS : INC_CATS;
  const cat  = cats.find(c => c.id === sel.value || (c.id === null && c.name === sel.options[sel.selectedIndex].text));
  if (cat) { currentResult.catName = cat.name; currentResult.catId = cat.id; }
}

function onAccChange(sel) {
  const acc = ACCOUNTS.find(a => a.id === sel.value);
  if (acc) { currentResult.accId = acc.id; currentResult.accName = acc.name; }
}

function fillAmount(n) {
  const el = document.getElementById('resultAmount');
  if (el) { el.value = n; currentResult.amount = n; }
}

/* ────────────────────────────────────────────
   WRITE TO NOTION
──────────────────────────────────────────── */
async function confirmAndWrite() {
  if (!currentResult) return;
  const { type, amount, description, catId, accId, catName, accName } = currentResult;

  if (!amount || amount <= 0) return toast('Số tiền không hợp lệ', 'err');
  if (!description)           return toast('Cần có mô tả', 'err');

  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'Đang ghi...';

  const dbId  = type === 'expense' ? EXPENSES_DB : INCOMES_DB;
  const today = new Date().toISOString().split('T')[0];

  const props = {
    "List":   { title: [{ text: { content: description } }] },
    "Amount": { number: amount },
    "Date":   { date: { start: today } },
  };
  if (accId) props["Account"]  = { relation: [{ id: accId }] };
  if (catId) props["Category"] = { relation: [{ id: catId }] };

  try {
    const res = await fetch('https://api.notion.com/v1/pages', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${NOTION_TOKEN}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ parent: { database_id: dbId }, properties: props })
    });

    if (res.ok) {
      addHistory({ type, amount, description, catName, accName });
      toast('✓ Đã ghi!', 'ok');
      document.getElementById('resultCard').style.display = 'none';
      currentResult = null;
    } else {
      const err = await res.json();
      // CORS check
      toast('CORS: cần deploy lên server. Xem hướng dẫn bên dưới.', 'err');
      console.error(err);
    }
  } catch(e) {
    toast('⚠ Cần deploy lên HTTPS để gọi Notion API (CORS)', 'err');
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = 'Ghi vào Notion →';
}

/* ────────────────────────────────────────────
   HISTORY
──────────────────────────────────────────── */
function addHistory({ type, amount, description, catName, accName }) {
  const color = type === 'expense' ? 'var(--expense)' : 'var(--income)';
  const sign  = type === 'expense' ? '−' : '+';
  const list  = document.getElementById('histList');
  const item  = document.createElement('div');
  item.className = 'hist-item';
  item.innerHTML = `
    <div class="hist-dot" style="background:${color}"></div>
    <div class="hist-info">
      <div class="hist-desc">${escHtml(description)}</div>
      <div class="hist-meta">${catName} · ${accName}</div>
    </div>
    <div class="hist-amount" style="color:${color}">${sign}${amount.toLocaleString('vi')}đ</div>`;
  list.prepend(item);
  if (list.children.length > 6) list.lastChild.remove();
}

/* ────────────────────────────────────────────
   UTILS
──────────────────────────────────────────── */
function fmtShort(n) {
  if (n >= 1000000) return (n/1000000) + 'tr';
  if (n >= 1000)    return (n/1000) + 'k';
  return n;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = `toast ${type}`, 3500);
}
</script>
